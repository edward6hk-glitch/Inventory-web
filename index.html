<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKOH A&OT 物品管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .locker-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">📦 櫃位物品查詢系統</h1>
            <div id="loading-status" class="text-sm bg-blue-700 px-3 py-1 rounded">系統連線中...</div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        
        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋物品 (例如：酒精、副木)..." 
                   class="w-full p-3 rounded-lg border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="locker-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>

        <div id="detail-view" class="hidden">
            <button onclick="showLockerGrid()" class="mb-4 text-blue-600 font-semibold flex items-center">
                ← 返回櫃位總覽
            </button>
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div id="locker-info" class="p-4 bg-gray-50 border-b">
                    <h2 id="current-locker-name" class="text-2xl font-bold text-gray-800">櫃位名稱</h2>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3">物品名稱</th>
                            <th class="p-3">數量</th>
                            <th class="p-3">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="item-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 請在此處替換成你的 Firebase Config ---
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "你的PROJECT_ID.firebaseapp.com",
            projectId: "你的PROJECT_ID",
            storageBucket: "你的PROJECT_ID.appspot.com",
            messagingSenderId: "你的SENDER_ID",
            appId: "你的APP_ID"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        document.getElementById('loading-status').innerText = "系統已連線";

        // 模擬數據渲染 (實際應從 Firestore 獲取)
        async function loadLockers() {
            const lockerGrid = document.getElementById('locker-grid');
            // 這裡假設你 Firestore 有一個 'lockers' collection
            const querySnapshot = await getDocs(collection(db, "lockers"));
            
            lockerGrid.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                lockerGrid.innerHTML += `
                    <div onclick="showItems('${doc.id}', '${data.name}')" 
                         class="locker-card bg-white p-6 rounded-xl shadow-md cursor-pointer border-t-4 border-blue-500">
                        <h3 class="text-xl font-bold text-gray-700">${data.name}</h3>
                        <p class="text-gray-500 mt-2">位置：${data.location || '未標註'}</p>
                        <p class="text-blue-600 mt-4 text-sm font-medium">點擊查看內容 →</p>
                    </div>
                `;
            });
        }

        // 顯示特定櫃位的物品
        window.showItems = async (lockerId, lockerName) => {
            document.getElementById('locker-grid').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('current-locker-name').innerText = lockerName;
            
            const itemList = document.getElementById('item-list');
            itemList.innerHTML = "<tr><td colspan='3' class='p-4 text-center text-gray-400'>載入中...</td></tr>";

            const q = query(collection(db, "items"), where("lockerId", "==", lockerId));
            const querySnapshot = await getDocs(q);
            
            itemList.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const statusColor = item.quantity > 5 ? 'text-green-600' : 'text-red-600';
                itemList.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-medium">${item.name}</td>
                        <td class="p-3">${item.quantity}</td>
                        <td class="p-3 font-bold ${statusColor}">${item.quantity > 5 ? '🟢 充足' : '🔴 需補貨'}</td>
                    </tr>
                `;
            });
        };

        window.showLockerGrid = () => {
            document.getElementById('locker-grid').classList.remove('hidden');
            document.getElementById('detail-view').classList.add('hidden');
        };

        // 初始載入
        loadLockers();
    </script>
</body>
</html>
